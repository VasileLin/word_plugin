<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Word Pattern Formatter</title>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="taskpane.css" />
</head>

<body>
<div class="app">
    <div class="header">
        <div>
            <h1>Pattern Formatter</h1>
            <p>Salvează și aplică rapid formatarea pentru textul selectat.</p>
        </div>
    </div>

    <div class="card">
        <h2>Pattern nou</h2>

        <label for="patternName">Nume pattern</label>
        <input id="patternName" type="text" placeholder="Ex: Text academic" />

        <div class="grid">
            <div>
                <label for="fontName">Font</label>
                <input id="fontName" type="text" list="fontOptions" value="Times New Roman" />

                <datalist id="fontOptions">
                    <option value="Times New Roman"></option>
                    <option value="Arial"></option>
                    <option value="Calibri"></option>
                    <option value="Georgia"></option>
                    <option value="Verdana"></option>
                    <option value="Cambria"></option>
                    <option value="Courier New"></option>
                    <option value="Book Antiqua"></option>
                    <option value="Garamond"></option>
                    <option value="Tahoma"></option>
                </datalist>
            </div>

            <div>
                <label for="fontSize">Mărime</label>
                <input id="fontSize" type="number" value="12" min="8" max="72" />
            </div>
        </div>

        <label for="alignment">Aliniere</label>
        <select id="alignment">
            <option value="Left">Stânga</option>
            <option value="Centered">Centru</option>
            <option value="Right">Dreapta</option>
            <option value="Justified">Justify</option>
        </select>

        <label for="lineSpacing">Spațiere rânduri</label>
        <input id="lineSpacing" type="number" value="1.5" min="1" max="5" step="0.1" />

        <div class="options">
            <label class="check">
                <input id="bold" type="checkbox" />
                <span>Bold</span>
            </label>

            <label class="check">
                <input id="italic" type="checkbox" />
                <span>Italic</span>
            </label>
        </div>

        <button id="readSelectionButton" class="button secondary">
            Preia din selecție
        </button>

        <button id="savePatternButton" class="button primary">
            Salvează pattern
        </button>
    </div>

    <div class="card">
        <h2>Patternuri salvate</h2>

        <label for="savedPatterns">Alege pattern</label>
        <select id="savedPatterns"></select>

        <button id="applyPatternButton" class="button primary">
            Aplică pattern
        </button>
        <button id="editPatternButton" class="button secondary">
            Editează pattern
        </button>
        <button id="deletePatternButton" class="button danger">
            Șterge pattern
        </button>
    </div>

    <p id="message" class="message"></p>
</div>
</body>
</html>
