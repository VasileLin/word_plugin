<!doctype html><html><head><meta charset="UTF-8"/><title>Word Pattern Formatter</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><link rel="stylesheet" href="94e0920c1d4292cd5deb.css"/><script defer="defer" src="polyfill.js"></script><script defer="defer" src="taskpane.js"></script></head><body><div class="app"><div class="header"><div><h1>Pattern Formatter</h1><p>Save and apply reusable formatting for the selected text.</p></div></div><div class="card"><h2>New Pattern</h2><label for="patternName">Pattern name</label> <input id="patternName" placeholder="Example: Academic text"/><div class="grid"><div><label for="fontName">Font</label> <input id="fontName" list="fontOptions" value="Times New Roman"/><datalist id="fontOptions"><option value="Times New Roman"></option><option value="Arial"></option><option value="Calibri"></option><option value="Georgia"></option><option value="Verdana"></option><option value="Cambria"></option><option value="Courier New"></option><option value="Book Antiqua"></option><option value="Garamond"></option><option value="Tahoma"></option></datalist></div><div><label for="fontSize">Size</label> <input id="fontSize" type="number" value="12" min="8" max="72"/></div></div><label for="alignment">Alignment</label> <select id="alignment"><option value="Left">Left</option><option value="Centered">Center</option><option value="Right">Right</option><option value="Justified">Justified</option></select> <label for="lineSpacing">Line spacing</label> <input id="lineSpacing" type="number" value="1.5" min="1" max="5" step="0.1"/><div class="options"><label class="check"><input id="bold" type="checkbox"/> <span>Bold</span></label> <label class="check"><input id="italic" type="checkbox"/> <span>Italic</span></label></div><button id="readSelectionButton" class="button secondary">Read from selection</button> <button id="savePatternButton" class="button primary">Save pattern</button></div><div class="card"><h2>Saved Patterns</h2><label for="savedPatterns">Choose pattern</label> <select id="savedPatterns"></select> <button id="applyPatternButton" class="button primary">Apply pattern</button> <button id="editPatternButton" class="button secondary">Edit pattern</button> <button id="deletePatternButton" class="button danger">Delete pattern</button></div><p id="message" class="message"></p></div></body></html>
