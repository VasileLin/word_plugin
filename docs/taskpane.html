<!doctype html><html><head><meta charset="UTF-8"/><title>Word Pattern Formatter</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><link rel="stylesheet" href="taskpane.css"/><script defer="defer" src="polyfill.js"></script><script defer="defer" src="taskpane.js"></script></head><body><div class="app"><header class="header"><p class="eyebrow">Word add-in</p><h1>Pattern Formatter</h1><p>Capture formatting from Word and reuse it across selected text.</p></header><div class="tabs" role="tablist" aria-label="Pattern formatter views"><button id="newPatternTab" class="tab active" type="button" role="tab" aria-controls="newPatternPanel" aria-selected="true">New Pattern</button> <button id="savedPatternsTab" class="tab" type="button" role="tab" aria-controls="savedPatternsPanel" aria-selected="false">Saved Patterns</button></div><main class="panel"><section id="newPatternPanel" class="tab-panel active" role="tabpanel" aria-labelledby="newPatternTab"><div class="section-heading"><h2>Create or Edit</h2><p>Define the style settings you want to reuse.</p></div><label for="patternName">Pattern name</label> <input id="patternName" placeholder="Example: Academic text"/><div class="grid"><div><label for="fontName">Font</label> <input id="fontName" list="fontOptions" value="Times New Roman"/><datalist id="fontOptions"><option value="Times New Roman"></option><option value="Arial"></option><option value="Calibri"></option><option value="Georgia"></option><option value="Verdana"></option><option value="Cambria"></option><option value="Courier New"></option><option value="Book Antiqua"></option><option value="Garamond"></option><option value="Tahoma"></option></datalist></div><div><label for="fontSize">Size</label> <input id="fontSize" type="number" value="12" min="8" max="72"/></div></div><label for="alignment">Alignment</label> <select id="alignment"><option value="Left">Left</option><option value="Centered">Center</option><option value="Right">Right</option><option value="Justified">Justified</option></select> <label for="lineSpacing">Line spacing</label> <input id="lineSpacing" type="number" value="1.5" min="1" max="5" step="0.1"/><div class="options"><label class="check"><input id="bold" type="checkbox"/> <span>Bold</span></label> <label class="check"><input id="italic" type="checkbox"/> <span>Italic</span></label></div><div class="actions"><button id="readSelectionButton" class="button secondary" type="button">Read from selection</button> <button id="savePatternButton" class="button primary" type="button">Save pattern</button></div></section><section id="savedPatternsPanel" class="tab-panel" role="tabpanel" aria-labelledby="savedPatternsTab" hidden><div class="section-heading"><h2>Apply Saved Pattern</h2><p>Select a pattern and apply it to the current Word selection.</p></div><label for="savedPatterns">Choose pattern</label> <select id="savedPatterns"></select><div class="actions"><button id="applyPatternButton" class="button primary" type="button">Apply pattern</button> <button id="editPatternButton" class="button secondary" type="button">Edit pattern</button> <button id="deletePatternButton" class="button danger" type="button">Delete pattern</button></div></section></main><p id="message" class="message" aria-live="polite"></p></div></body></html>
