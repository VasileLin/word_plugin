<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Word Pattern Formatter</title>

    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="taskpane.css" />
</head>

<body>
<div class="app">
    <header class="header">
        <p class="eyebrow">Word add-in</p>
        <h1>Pattern Formatter</h1>
        <p>Capture formatting from Word and reuse it across selected text.</p>
    </header>

    <div class="tabs" role="tablist" aria-label="Pattern formatter views">
        <button id="newPatternTab" class="tab active" type="button" role="tab" aria-controls="newPatternPanel" aria-selected="true">
            New Pattern
        </button>
        <button id="savedPatternsTab" class="tab" type="button" role="tab" aria-controls="savedPatternsPanel" aria-selected="false">
            Saved Patterns
        </button>
    </div>

    <main class="panel">
        <section id="newPatternPanel" class="tab-panel active" role="tabpanel" aria-labelledby="newPatternTab">
            <div class="section-heading">
                <h2>Create or Edit</h2>
                <p>Define the style settings you want to reuse.</p>
            </div>

            <label for="patternName">Pattern name</label>
            <input id="patternName" type="text" placeholder="Example: Academic text" />

            <div class="grid">
                <div>
                    <label for="fontName">Font</label>
                    <input id="fontName" type="text" list="fontOptions" value="Times New Roman" />

                    <datalist id="fontOptions">
                        <option value="Times New Roman"></option>
                        <option value="Arial"></option>
                        <option value="Calibri"></option>
                        <option value="Georgia"></option>
                        <option value="Verdana"></option>
                        <option value="Cambria"></option>
                        <option value="Courier New"></option>
                        <option value="Book Antiqua"></option>
                        <option value="Garamond"></option>
                        <option value="Tahoma"></option>
                    </datalist>
                </div>

                <div>
                    <label for="fontSize">Size</label>
                    <input id="fontSize" type="number" value="12" min="8" max="72" />
                </div>
            </div>

            <label for="alignment">Alignment</label>
            <select id="alignment">
                <option value="Left">Left</option>
                <option value="Centered">Center</option>
                <option value="Right">Right</option>
                <option value="Justified">Justified</option>
            </select>

            <label for="lineSpacing">Line spacing</label>
            <input id="lineSpacing" type="number" value="1.5" min="1" max="5" step="0.1" />

            <details class="advanced" open>
                <summary>Advanced formatting</summary>

                <div class="options">
                    <label class="check">
                        <input id="bold" type="checkbox" />
                        <span>Bold</span>
                    </label>

                    <label class="check">
                        <input id="italic" type="checkbox" />
                        <span>Italic</span>
                    </label>

                    <label class="check">
                        <input id="underline" type="checkbox" />
                        <span>Underline</span>
                    </label>
                </div>

                <div class="grid">
                    <div>
                        <label for="textColor">Text color</label>
                        <input id="textColor" type="color" value="#000000" />
                    </div>

                    <div>
                        <label for="highlightColor">Highlight</label>
                        <select id="highlightColor">
                            <option value="">None</option>
                            <option value="#ffff00">Yellow</option>
                            <option value="#92d050">Green</option>
                            <option value="#00b0f0">Blue</option>
                            <option value="#ff99cc">Pink</option>
                        </select>
                    </div>
                </div>

                <div class="paragraph-grid">
                    <div>
                        <label for="spaceBefore">Before</label>
                        <input id="spaceBefore" type="number" value="0" min="0" max="72" step="1" />
                    </div>
                    <div>
                        <label for="spaceAfter">After</label>
                        <input id="spaceAfter" type="number" value="0" min="0" max="72" step="1" />
                    </div>
                    <div>
                        <label for="leftIndent">Left indent</label>
                        <input id="leftIndent" type="number" value="0" min="0" max="144" step="1" />
                    </div>
                    <div>
                        <label for="rightIndent">Right indent</label>
                        <input id="rightIndent" type="number" value="0" min="0" max="144" step="1" />
                    </div>
                    <div>
                        <label for="firstLineIndent">First line</label>
                        <input id="firstLineIndent" type="number" value="0" min="-72" max="144" step="1" />
                    </div>
                </div>
            </details>

            <div class="actions">
                <button id="readSelectionButton" class="button secondary" type="button">
                    Read from selection
                </button>

                <button id="clearFormButton" class="button ghost" type="button">
                    Clear form
                </button>

                <button id="savePatternButton" class="button primary" type="button">
                    Save pattern
                </button>
            </div>
        </section>

        <section id="savedPatternsPanel" class="tab-panel" role="tabpanel" aria-labelledby="savedPatternsTab" hidden>
            <div class="section-heading">
                <h2>Apply Saved Pattern</h2>
                <p>Select a pattern and apply it to the current Word selection.</p>
            </div>

            <label for="patternSearch">Search patterns</label>
            <input id="patternSearch" type="search" placeholder="Filter by name, font, or style" />

            <label for="patternSort">Sort patterns</label>
            <select id="patternSort">
                <option value="az">Name A-Z</option>
                <option value="za">Name Z-A</option>
            </select>

            <label for="savedPatterns">Choose pattern</label>
            <select id="savedPatterns"></select>

            <div id="patternPreview" class="preview" aria-live="polite">
                <p class="preview-empty">No pattern selected.</p>
            </div>

            <label for="applyScope">Apply to</label>
            <select id="applyScope">
                <option value="selection">Selected text</option>
                <option value="paragraph">Current paragraph</option>
                <option value="document">Whole document</option>
            </select>

            <div class="utility-actions">
                <button id="exportPatternsButton" class="button ghost" type="button">
                    Export JSON
                </button>
                <button id="importPatternsButton" class="button ghost" type="button">
                    Import JSON
                </button>
                <button id="resetDefaultsButton" class="button ghost" type="button">
                    Reset defaults
                </button>
            </div>
            <input id="importPatternsFile" class="file-input" type="file" accept="application/json,.json" />

            <div class="actions">
                <button id="applyPatternButton" class="button primary" type="button">
                    Apply pattern
                </button>
                <button id="editPatternButton" class="button secondary" type="button">
                    Edit pattern
                </button>
                <button id="duplicatePatternButton" class="button ghost" type="button">
                    Duplicate pattern
                </button>
                <button id="deletePatternButton" class="button danger" type="button">
                    Delete pattern
                </button>
            </div>
        </section>
    </main>

    <p id="message" class="message" aria-live="polite"></p>
    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
</div>
</body>
</html>
